name: Refresh catalog

permissions:
  contents: write

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: catalog-refresh
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24.18.0
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Collect official sources
        run: pnpm collect
        env:
          KMODELS_JITTER_MS: "30000"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

      - name: Verify generated catalog
        run: pnpm test

      - name: Commit validated changes
        run: |
          git add data public/data public/v1
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(data): refresh provider catalog"
          git push
