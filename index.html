<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#e7ede5" />
    <script>
      (() => {
        let theme;
        try {
          theme = localStorage.getItem("theme");
        } catch {}
        if (theme !== "light" && theme !== "dark") {
          theme = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.dataset.theme = theme;
        document.querySelector('meta[name="theme-color"]').content =
          theme === "dark" ? "#000f06" : "#e7ede5";
      })();
    </script>
    <meta
      name="description"
      content="Search model identities, capabilities, prices, and source evidence observed from official provider sources."
    />
    <title>Kmodels</title>
  </head>
  <body>
    <div id="app"></div>
    <noscript>
      <main class="fallback">
        <h1>Kmodels</h1>
        <p>JavaScript is required to load the catalog.</p>
      </main>
    </noscript>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
